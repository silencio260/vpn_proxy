name: vpn_proxy
description: "VPN Proxy - Secure & Fast VPN powered by OpenVPN"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7

  # Dependency injection
  get_it: ^9.2.0

  # Functional programming (Either)
  dartz: ^0.10.1

  # Networking
  dio: ^5.9.0
  http: ^1.3.0
  internet_connection_checker: ^1.0.0+1

  # CSV parsing (for vpngate.net)
  csv: ^6.0.0

  # Local storage
  shared_preferences: ^2.5.4

  # VPN engine (provides vpnControl / vpnStage / vpnStatus channels)
  openvpn_flutter: ^1.3.3

  # UI
  lottie: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/images/
    - assets/lottie/
    - assets/flags/
